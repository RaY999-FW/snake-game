<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>彩虹贪吃蛇</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1>🐍 彩虹贪吃蛇</h1>
      <div class="score">
        <span class="label">分数</span>
        <span id="score">0</span>
        <span class="sep">·</span>
        <span class="label">最高</span>
        <span id="best">0</span>
      </div>
    </header>

    <section class="settings" id="settings">
      <div class="row">
        <label>难度</label>
        <div class="seg" id="difficulty">
          <button data-v="easy" class="active">简单</button>
          <button data-v="normal">普通</button>
          <button data-v="hard">困难</button>
          <button data-v="insane">地狱</button>
        </div>
      </div>
      <div class="row">
        <label>场地大小</label>
        <div class="seg" id="size">
          <button data-v="14">14×14</button>
          <button data-v="20" class="active">20×20</button>
          <button data-v="28">28×28</button>
          <button data-v="40">40×40</button>
        </div>
      </div>
      <div class="row">
        <label>速度(帧/秒)</label>
        <div class="slider-row">
          <input type="range" id="speed" min="4" max="30" value="10" step="1" />
          <span id="speedVal" class="val">10</span>
        </div>
      </div>
      <div class="row toggles">
        <label class="chk"><input type="checkbox" id="wrap" /> 穿墙</label>
        <label class="chk"><input type="checkbox" id="rainbow" checked /> 彩虹蛇</label>
        <label class="chk"><input type="checkbox" id="sound" /> 音效</label>
      </div>
    </section>

    <main class="stage">
      <canvas id="game"></canvas>
      <div class="overlay" id="overlay">
        <div class="panel">
          <h2 id="ovTitle">准备开始</h2>
          <p id="ovSub">点击下方按钮开始游戏</p>
          <button id="startBtn" class="big">开始</button>
        </div>
      </div>
    </main>

    <div class="pad" id="dpad" aria-label="方向控制">
      <button data-dir="up" class="up">▲</button>
      <button data-dir="left" class="left">◀</button>
      <button data-dir="down" class="down">▼</button>
      <button data-dir="right" class="right">▶</button>
    </div>

    <footer class="actions">
      <button id="pauseBtn">暂停</button>
      <button id="resetBtn">重开</button>
    </footer>
  </div>
  <script src="js/sound.js"></script>
  <script src="js/snake.js"></script>
</body>
</html>
